services:
  postgres:
    image: postgres:16-alpine
    container_name: escola-remo-db
    environment:
      POSTGRES_DB: escola_remo
      POSTGRES_USER: escola
      POSTGRES_PASSWORD: escola123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escola -d escola_remo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: escola-remo-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/escola_remo
      SPRING_DATASOURCE_USERNAME: escola
      SPRING_DATASOURCE_PASSWORD: escola123
      APP_SEED_ENABLED: "true"
      APP_UPLOADS_DIR: /app/uploads
      TZ: America/Sao_Paulo
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
